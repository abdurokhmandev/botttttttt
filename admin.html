<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard - Rahimov School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #14c767;
            --green-dark: #0fa855;
            --gray-1: #111111;
            --gray-2: #444444;
            --gray-3: #888888;
            --gray-4: #cccccc;
            --bg: #f7f9fc;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }
        body {
            background: var(--bg);
            color: var(--gray-1);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: var(--white);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 24px; font-weight: 800; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1.5px solid var(--gray-4);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .login-card input:focus { border-color: var(--green); }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: var(--green-dark); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg { color: #e53935; font-size: 13px; margin-bottom: 12px; display: none; }

        /* Dashboard Screen */
        #dashboard-screen {
            display: none;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .header h1 { font-weight: 900; }
        .logout-btn {
            background: transparent;
            color: var(--gray-3);
            border: 1px solid var(--gray-4);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .logout-btn:hover { background: var(--gray-4); color: var(--gray-1); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .stat-card h3 { font-size: 13px; color: var(--gray-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 900; color: var(--gray-1); }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        @media(max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        .chart-container {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .chart-container h3 { margin-bottom: 16px; font-size: 16px; font-weight: 700; }

        .table-container {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        .table-container h3 { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { font-size: 12px; text-transform: uppercase; color: var(--gray-3); font-weight: 700; }
        td { font-size: 14px; color: var(--gray-2); font-weight: 500; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Admin Login</h2>
            <div id="login-error" class="error-msg">Parol xato! Qaytadan urinib ko'ring.</div>
            <form id="login-form">
                <input type="password" id="password" placeholder="Parolni kiriting" required>
                <button type="submit" class="btn" id="login-btn">Kirish</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Chiqish</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Jami Foydalanuvchilar</h3>
                <div class="value" id="val-total">0</div>
            </div>
            <div class="stat-card">
                <h3>Ro'yxatdan O'tganlar</h3>
                <div class="value" id="val-registered">0</div>
            </div>
            <div class="stat-card">
                <h3>Botni Bloklaganlar</h3>
                <div class="value" id="val-blocked">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>Holatlar</h3>
                <canvas id="usersChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Videolar Ko'rilishi</h3>
                <canvas id="videosChart"></canvas>
            </div>
        </div>

        <div class="table-container">
            <h3>Oxirgi Ro'yxatdan O'tganlar</h3>
            <table>
                <thead>
                    <tr>
                        <th>T/R</th>
                        <th>Ism Familiya</th>
                        <th>Telefon</th>
                        <th>Sinf</th>
                        <th>Hudud</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Dinamik ravishda qo'shiladi -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://botttttttt-production.up.railway.app/api/admin/stats";
        // Agar siz lokal test qilmoqchi bo'lsangiz:
        // const API_URL = "http://127.0.0.1:8080/api/admin/stats";

        let usersChartInstance = null;
        let videosChartInstance = null;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            
            btn.disabled = true;
            btn.innerText = "Yuklanmoqda...";
            errorEl.style.display = 'none';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });

                const json = await res.json();
                if (json.ok) {
                    sessionStorage.setItem('admin_pass', pass);
                    showDashboard(json.data);
                } else {
                    errorEl.innerText = json.error === "Unauthorized" ? "Parol xato!" : json.error;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.innerText = "Server bilan bog'lanishda xatolik: " + err.message;
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = "Kirish";
            }
        });

        function logout() {
            sessionStorage.removeItem('admin_pass');
            document.getElementById('password').value = '';
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        // Auto-login agar parol saqlangan bo'lsa
        window.onload = async () => {
            const pass = sessionStorage.getItem('admin_pass');
            if (pass) {
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pass })
                    });
                    const json = await res.json();
                    if (json.ok) {
                        showDashboard(json.data);
                    } else {
                        sessionStorage.removeItem('admin_pass');
                    }
                } catch (e) {
                    console.error("Auto login failed", e);
                }
            }
        };

        function showDashboard(data) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';

            // Top Stats
            const u = data.user_stats;
            document.getElementById('val-total').innerText = u.total;
            document.getElementById('val-registered').innerText = u.registered;
            document.getElementById('val-blocked').innerText = u.blocked;

            // Pie Chart
            const ctx1 = document.getElementById('usersChart').getContext('2d');
            if (usersChartInstance) usersChartInstance.destroy();
            usersChartInstance = new Chart(ctx1, {
                type: 'pie',
                data: {
                    labels: ["Ro'yxatdan o'tganlar", "O'tmaganlar", "Bloklaganlar"],
                    datasets: [{
                        data: [u.registered, u.unregistered, u.blocked],
                        backgroundColor: ['#14c767', '#cccccc', '#e53935'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Bar Chart
            const ctx2 = document.getElementById('videosChart').getContext('2d');
            const v = data.video_stats;
            if (videosChartInstance) videosChartInstance.destroy();
            videosChartInstance = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: v.labels,
                    datasets: [{
                        label: 'Ko\'rishlar soni',
                        data: v.views,
                        backgroundColor: '#14c767',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // Table
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';
            data.recent_users.forEach((user, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${user.name}</td>
                    <td>${user.phone}</td>
                    <td>${user.grade}</td>
                    <td>${user.district}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
